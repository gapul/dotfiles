# Starship 最小設定 - 省電力モード用
# 必要最小限のプロンプト情報のみ表示

format = """
$directory\
$git_branch\
$git_status\
$character
"""

# ディレクトリ表示
[directory]
style = "blue bold"
truncation_length = 3
truncate_to_repo = true

# Git ブランチ
[git_branch]
style = "purple bold"
format = "[$symbol$branch]($style) "

# Git ステータス
[git_status]
style = "red bold"
format = '([\[$all_status$ahead_behind\]]($style) )'

# プロンプト文字
[character]
success_symbol = "[❯](green bold)"
error_symbol = "[❯](red bold)"

# 無効化するモジュール（省電力のため）
