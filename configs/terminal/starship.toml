# Starship Configuration - Poimandres Dark Theme (falleco-inspired)
# Enhanced prompt with modern styling and optimized performance

format = """
[](color_bg1)\
$os\
$username\
[](bg:color_bg2 fg:color_bg1)\
$directory\
[](fg:color_bg2 bg:color_bg3)\
$git_branch\
$git_status\
[](fg:color_bg3 bg:color_bg4)\
$nodejs\
$rust\
$golang\
$php\
$python\
$java\
$kotlin\
$lua\
$nix_shell\
[](fg:color_bg4 bg:color_bg5)\
$docker_context\
[](fg:color_bg5)\
$line_break\
$character"""

palette = 'poimandres'

[palettes.poimandres]
# Poimandres color scheme
color_fg = '#a6accd'
color_bg1 = '#1b1e28'
color_bg2 = '#303340'
color_bg3 = '#505168'
color_bg4 = '#767c9d'
color_bg5 = '#a6accd'
color_red = '#d0679d'
color_green = '#5de4c7'
color_yellow = '#fffac2'
color_blue = '#89ddff'
color_purple = '#b4a4f7'
color_cyan = '#add7ff'
color_orange = '#fcc5e9'

[os]
disabled = false
style = "bg:color_bg1 fg:color_fg"

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = ""
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = ""
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = ""
Amazon = ""
Android = ""
Arch = "¾░Żć"
Artix = "¾░Żć"
CentOS = ""
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_user = "bg:color_bg1 fg:color_fg"
style_root = "bg:color_bg1 fg:color_red"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg bg:color_bg2"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = " "
"Music" = "¾░ØÜ "
"Pictures" = " "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol $branch ](fg:color_purple bg:color_bg3)]($style)'

[git_status]
style = "bg:color_bg3"
format = '[[($all_status$ahead_behind )](fg:color_purple bg:color_bg3)]($style)'

[nodejs]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_green bg:color_bg4)]($style)'

[rust]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_orange bg:color_bg4)]($style)'

[golang]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_cyan bg:color_bg4)]($style)'

[php]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_purple bg:color_bg4)]($style)'

[python]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_yellow bg:color_bg4)]($style)'

[java]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_red bg:color_bg4)]($style)'

[kotlin]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_purple bg:color_bg4)]($style)'

[lua]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_blue bg:color_bg4)]($style)'

[nix_shell]
symbol = ""
style = "bg:color_bg4"
format = '[[ $symbol( $name) ](fg:color_blue bg:color_bg4)]($style)'

[docker_context]
symbol = ""
style = "bg:color_bg5"
format = '[[ $symbol( $context) ](fg:color_bg1 bg:color_bg5)]($style)'

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:color_green)'
error_symbol = '[ŌØ»](bold fg:color_red)'
vimcmd_symbol = '[ŌØ«](bold fg:color_green)'

[cmd_duration]
min_time = 1000
format = "took [$duration](fg:color_yellow)"
disabled = false

[line_break]
disabled = false

# Language-specific optimizations
[c]
symbol = " "
format = '[$symbol($version(-$name))]($style)'
style = "fg:color_blue"

[cmake]
format = '[$symbol($version)]($style)'
style = "fg:color_cyan"

[dart]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_blue"

[deno]
format = '[$symbol($version)]($style)'
style = "fg:color_green"

[dotnet]
symbol = "¾░¬« "
format = '[$symbol($version)]($style)'
style = "fg:color_purple"

[elixir]
symbol = " "
format = '[$symbol($version \(OTP $otp_version\))]($style)'
style = "fg:color_purple"

[elm]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_cyan"

[erlang]
format = '[$symbol($version)]($style)'
style = "fg:color_red"

[fennel]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_green"

[gleam]
format = '[$symbol($version)]($style)'
style = "fg:color_purple"

[gradle]
format = '[$symbol($version)]($style)'
style = "fg:color_cyan"

[haskell]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_purple"

[haxe]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_orange"

[helm]
format = '[$symbol($version)]($style)'
style = "fg:color_blue"

[julia]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_purple"

[nim]
symbol = "¾░åź "
format = '[$symbol($version)]($style)'
style = "fg:color_yellow"

[ocaml]
symbol = " "
format = '[$symbol($version)(\($switch_indicator$switch_name\))]($style)'
style = "fg:color_orange"

[perl]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_cyan"

[purescript]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_purple"

[ruby]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_red"

[scala]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_red"

[swift]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_orange"

[terraform]
symbol = "¾▒üó "
format = '[$symbol($workspace)]($style)'
style = "fg:color_purple"

[zig]
symbol = " "
format = '[$symbol($version)]($style)'
style = "fg:color_yellow"

# Cloud providers
[aws]
symbol = "¾░ĖÅ "
format = '[$symbol($profile)(\($region\))(\[$duration\])]($style)'
style = "fg:color_orange"

[gcloud]
symbol = "¾▒ćČ "
format = '[$symbol($account(@$domain)(\($region\)))]($style)'
style = "fg:color_blue"

[azure]
symbol = "¾░Āģ "
format = '[$symbol($subscription)]($style)'
style = "fg:color_cyan"

# Tools and services
[conda]
symbol = " "
format = '[$symbol$environment]($style)'
style = "fg:color_green"

[kubernetes]
symbol = "¾▒āŠ "
format = '[$symbol$context(\($namespace\))]($style)'
style = "fg:color_cyan"
disabled = false

[memory_usage]
symbol = "¾░Źø "
format = '[$symbol[$ram]]($style)'
style = "fg:color_yellow"
threshold = 70
disabled = false

[battery]
format = '[$symbol$percentage]($style)'
disabled = false

[[battery.display]]
threshold = 20
style = "fg:color_red"
charging_symbol = "¾░éä "
discharging_symbol = "¾░ü║ "

[[battery.display]]
threshold = 50
style = "fg:color_yellow"
charging_symbol = "¾░éŗ "
discharging_symbol = "¾░üŠ "

[[battery.display]]
threshold = 80
style = "fg:color_green"
charging_symbol = "¾░éŖ "
discharging_symbol = "¾░éĆ "

[[battery.display]]
threshold = 100
style = "fg:color_green"
charging_symbol = "¾░ü╣ "
discharging_symbol = "¾░ü╣ "

# Time display (right prompt)
[time]
disabled = false
format = '[$time]($style)'
style = "fg:color_blue"
time_format = "%H:%M"

# Status indicators
[status]
symbol = "ŌØī"
success_symbol = ""
format = '[$symbol$status]($style)'
style = "fg:color_red"
disabled = false

[jobs]
symbol = "¾░äē "
format = '[$symbol$number]($style)'
style = "fg:color_yellow"

[hostname]
ssh_only = true
format = '[@$hostname]($style)'
style = "fg:color_green"

# Package managers
[package]
symbol = "¾░ÅŚ "
format = '[$symbol$version]($style)'
style = "fg:color_orange"

# Git advanced
[git_commit]
commit_hash_length = 7
format = '[\($hash$tag\)]($style)'
style = "fg:color_green"

[git_state]
format = '\([$state($progress_current/$progress_total)]($style)\)'
style = "fg:color_yellow"

[git_metrics]
added_style = "fg:color_green"
deleted_style = "fg:color_red"
format = '([+$added]($added_style))([-$deleted]($deleted_style))'
disabled = false

# Performance optimizations
scan_timeout = 30
command_timeout = 500
add_newline = true