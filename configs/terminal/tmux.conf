# tmux設定ファイル
# ターミナルセッションの永続化と効率的な操作を提供

# 基本設定
set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g mouse on

# プレフィックスキーをCtrl+aに変更（screenライク）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ウィンドウとペインの番号を1から開始
set -g base-index 1
setw -g pane-base-index 1

# 設定ファイルのリロード
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Yabai使用のため分割機能は最小限に
# 必要に応じてペイン分割（あまり使用しない想定）
bind | split-window -h
bind - split-window -v

# セッション管理重視（Yabaiがウィンドウ管理を担当）
bind s choose-tree -s
bind w choose-tree -w

# ウィンドウ移動（タブ風操作）
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
bind -r Tab next-window
bind -r S-Tab previous-window

# 新しいウィンドウを現在のディレクトリで開く
bind c new-window -c "#{pane_current_path}"

# セッション管理強化
bind C new-session
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# コピーモード（Vim風）
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# macOS クリップボード統合（強化版）
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
set -g set-clipboard on

# ユニバーサルクリップボード対応
# macOSシステムクリップボードとの完全統合
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# ステータスバーのカスタマイズ
set -g status-bg colour235
set -g status-fg colour136
set -g status-left-length 20
set -g status-left '#[fg=green][#S] '
set -g status-right '#[fg=yellow]%Y-%m-%d %H:%M #[fg=green]#H'

# ウィンドウステータスの色設定
setw -g window-status-current-style 'fg=colour81 bg=colour238 bold'
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

# Yabai環境のためペインボーダーは最小限
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour240'

# アクティビティ監視
setw -g monitor-activity on
set -g visual-activity on

# セッション自動復元設定（tmux-resurrect用）
# プラグインマネージャーを使用する場合
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# エスケープタイムの短縮
set -sg escape-time 1

# 日本語環境対応
setw -g utf8 on
set -g status-utf8 on