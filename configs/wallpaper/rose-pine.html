<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rosé Pine Flow Wallpaper</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #191724; }
  canvas { display: block; width: 100vw; height: 100vh; }

  /* 右下の控えめなマーカー */
  .marker {
    position: fixed;
    bottom: 28px;
    right: 32px;
    color: rgba(224,222,244,0.22);  /* rose-pine text を薄く */
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    z-index: 10;
    pointer-events: none;
  }
  .marker .dot { color: rgba(196,167,231,0.55); }  /* iris */
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="marker">ROS&Eacute; PINE <span class="dot">&middot;</span> WS <span id="wsnum">1</span></div>
<script>
'use strict';

// ─────────── Rosé Pine (main / dark) パレット ───────────
// nix/lib/rose-pine.nix の hex をそのまま RGB 文字列化したもの。
// テーマ切替 (theme.nix の active) に追従させたい場合はここを差し替える。
const RP = {
  base:    '25,23,36',    // #191724 背景 (一番暗い)
  surface: '31,29,46',    // #1f1d2e
  overlay: '38,35,58',    // #26233a
  muted:   '110,106,134', // #6e6a86
  subtle:  '144,140,170', // #908caa
  text:    '224,222,244', // #e0def4
  love:    '235,111,146', // #eb6f92 赤/ピンク
  gold:    '246,193,119', // #f6c177 黄
  rose:    '235,188,186', // #ebbcba ローズ
  pine:    '49,116,143',  // #31748f 青
  foam:    '156,207,216', // #9ccfd8 シアン
  iris:    '196,167,231', // #c4a7e7 紫
};
const rgb = s => s.split(',').map(Number);

// ─────────── workspace別アクセント (Rosé Pine内で完結) ───────────
// 各ワークスペースに 2 色のアクセントを割り当て、フロー場の noise で
// 2 色間を RGB 補間する。背景は常に rose-pine base。
// 各 workspace = 色ペア + 流れの模様
//   scale=ノイズの粗さ(大きいほど細かい渦) / twist=渦の強さ / speed=線速度
//   drift=模様が時間で流れる速さ / width=線幅
const PALETTES = {
  '1': { a: RP.iris, b: RP.pine,    scale: 0.0015, twist: 2.6, speed: 1.3, drift: 0.0007, width: 0.9 }, // 紫→青 ゆったり大波
  '2': { a: RP.foam, b: RP.pine,    scale: 0.0030, twist: 3.6, speed: 1.5, drift: 0.0011, width: 0.7 }, // シアン→青 細かい渦
  '3': { a: RP.gold, b: RP.rose,    scale: 0.0020, twist: 2.4, speed: 1.2, drift: 0.0006, width: 1.0 }, // 金→ローズ なだらか
  '4': { a: RP.love, b: RP.iris,    scale: 0.0026, twist: 4.0, speed: 1.6, drift: 0.0012, width: 0.7 }, // 紅→紫 乱流
  '5': { a: RP.pine, b: RP.foam,    scale: 0.0017, twist: 3.0, speed: 1.4, drift: 0.0009, width: 0.8 }, // 青→シアン
  '6': { a: RP.iris, b: RP.love,    scale: 0.0024, twist: 3.4, speed: 1.5, drift: 0.0010, width: 0.8 }, // 紫→紅
  '7': { a: RP.foam, b: RP.iris,    scale: 0.0013, twist: 2.2, speed: 1.2, drift: 0.0006, width: 1.1 }, // シアン→紫 極ゆったり
  '8': { a: RP.rose, b: RP.love,    scale: 0.0028, twist: 3.8, speed: 1.5, drift: 0.0011, width: 0.7 }, // ローズ→紅
  '9': { a: RP.iris, b: RP.foam,    scale: 0.0021, twist: 3.2, speed: 1.4, drift: 0.0009, width: 0.8 }, // 紫→シアン
  '0': { a: RP.muted, b: RP.subtle, scale: 0.0016, twist: 2.0, speed: 1.0, drift: 0.0005, width: 0.9 }, // 灰 静かなモノクロ
  'S': { a: RP.pine, b: RP.iris,    scale: 0.0019, twist: 2.8, speed: 1.3, drift: 0.0008, width: 0.9 }, // 青→紫
};

let currentPalette = PALETTES['1'];

// 常時アニメーション (停止しない)。時刻シフトは毎フレーム計算されるので
// 一日の色変化はそのまま反映される。バッテリー時は Plash 側の
// deactivateOnBattery=1 が web view を止めるため、AC 中のみ動き続ける。
let started = false;

function applyWorkspace(ws) {
  ws = ws || '1';
  const next = PALETTES[ws] || PALETTES['1'];
  if (currentPalette === next) return;  // 変更なし
  currentPalette = next;
  document.getElementById('wsnum').textContent = ws;
  // 背景は塗り直さない。常時走っている tick() の trail フェードに任せれば、
  // 古い軌跡が薄れつつ新色のラインが重なって自然にクロスフェードする。
  // ここで paintBase() すると画が全消去され「最初から」に見えてしまう。
}

function startAnimation() {
  if (started) return;
  started = true;
  paintBase();
  requestAnimationFrame(tick);
}

// 同階層の state.js を <script>タグで定期ロード (cache buster付き)
// state.js の内容: window.__ws = "3";
function pollWorkspace() {
  const s = document.createElement('script');
  s.src = 'state.js?_=' + Date.now();
  s.onload = () => { applyWorkspace(window.__ws); s.remove(); };
  s.onerror = () => { s.remove(); };
  document.head.appendChild(s);
}
setInterval(pollWorkspace, 300);

// ─────────── canvasセットアップ ───────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

// 背景色を時間帯でティントする (rose-pine 内で完結):
//   昼   … surface 寄りに持ち上げ (わずかに明るく)
//   朝夕 … gold をうっすら混ぜて暖色化 (golden hour)
//   夜   … base のまま最も沈める
function tintBg(c, t) {
  const top = rgb(RP.surface);
  const gold = rgb(RP.gold);
  const lift = t.bgLift * 0.22;   // 昼: surface へ最大22%
  const warm = t.warmth * 0.10;   // 朝夕: gold へ最大10%
  return c.map((v, i) => {
    let x = v + (top[i] - v) * lift;
    x = x + (gold[i] - x) * warm;
    return Math.round(x);
  });
}

function paintBase() {
  // 現在時刻のティントを反映した base を全面塗り → 縦グラデで奥行き
  const t = computeTimeShift();
  const base = tintBg(rgb(RP.base), t);
  const top = tintBg(rgb(RP.surface), t);
  const g = ctx.createLinearGradient(0, 0, 0, window.innerHeight);
  g.addColorStop(0, `rgb(${top.join(',')})`);
  g.addColorStop(0.5, `rgb(${base.join(',')})`);
  g.addColorStop(1, `rgb(${base.join(',')})`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
}

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = canvas.width = window.innerWidth * dpr;
  H = canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(dpr, dpr);
  paintBase();
}
resize();
window.addEventListener('resize', resize);

// ─────────── Perlinノイズ (簡易版) ───────────
const perm = new Uint8Array(512);
{
  const p = [];
  for (let i = 0; i < 256; i++) p.push(i);
  for (let i = 255; i > 0; i--) {
    const j = (Math.random() * (i + 1)) | 0;
    [p[i], p[j]] = [p[j], p[i]];
  }
  for (let i = 0; i < 512; i++) perm[i] = p[i & 255];
}
const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
const lerp = (a, b, t) => a + t * (b - a);
const grad = (h, x, y) => {
  const u = (h & 1) ? -x : x;
  const v = (h & 2) ? -y : y;
  return u + v;
};
function noise2D(x, y) {
  const X = Math.floor(x) & 255;
  const Y = Math.floor(y) & 255;
  x -= Math.floor(x); y -= Math.floor(y);
  const u = fade(x), v = fade(y);
  const A = perm[X] + Y, B = perm[X + 1] + Y;
  return lerp(
    lerp(grad(perm[A],     x,     y),     grad(perm[B],     x - 1, y),     u),
    lerp(grad(perm[A + 1], x,     y - 1), grad(perm[B + 1], x - 1, y - 1), u),
    v
  );
}

// 2オクターブの fractal noise (fbm)。単一ノイズより模様に階層が出て richer に。
function fbm(x, y) {
  return noise2D(x, y) * 0.65 + noise2D(x * 2.13 + 19.1, y * 2.13 + 7.3) * 0.35;
}

// ─────────── パーティクル ───────────
const N = 200;
const particles = [];
const w = window.innerWidth;
const h = window.innerHeight;
for (let i = 0; i < N; i++) {
  particles.push({
    x: Math.random() * w,
    y: Math.random() * h,
    life: Math.random() * 200,
  });
}

// 時刻に応じた色シフト。Rosé Pine は dark テーマなので白飛びはさせず、
// 「明度」「暖色度 (golden hour)」「昼の持ち上げ」で一日の表情を変える。
//   深夜  : 最も沈み、寒色 (iris/pine)。warmth=0
//   朝焼け: 暖色 (gold) が乗る。warmth≈1, bgLift 低
//   正午  : 最も明るい。brightness≈1.05, bgLift≈1, warmth=0
//   夕焼け: 暖色 (gold) が乗る。warmth≈1
function computeTimeShift() {
  const now = new Date();
  const hr = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600 + now.getMilliseconds() / 3600000;
  const sunness = 0.5 * (1 + Math.cos((hr - 12) * Math.PI / 12));  // 0..1 正午=1, 真夜中=0
  const golden = Math.sin(Math.abs(hr - 12) * Math.PI / 12);       // 0..1 朝夕=1, 正午/深夜=0
  // 朝夕でも太陽が出ている時間帯 (sunness がある程度高い) のみ暖色を強める
  const warmth = golden * Math.min(1, sunness * 1.6);
  return {
    brightness: 0.78 + 0.27 * sunness,   // 夜0.78 → 昼1.05
    warmth,                              // 0..1 朝夕で最大
    bgLift: sunness,                     // 昼に背景を surface 寄りへ
    trailAlpha: 0.06 + 0.03 * sunness,   // 昼は少し速くフェード (くっきり)
  };
}

let frame = 0;
function tick() {
  const t = computeTimeShift();
  const [aR, aG, aB] = rgb(currentPalette.a);
  const [bR, bG, bB] = rgb(currentPalette.b);
  const [gR, gG, gB] = rgb(RP.gold);   // golden hour で寄せる暖色

  // 背景トレイルフェード: 時刻ティント済みの base をうっすら重ねて軌跡を残す
  const [tbR, tbG, tbB] = tintBg(rgb(RP.base), t);
  ctx.fillStyle = `rgba(${tbR},${tbG},${tbB}, ${t.trailAlpha})`;
  ctx.fillRect(0, 0, w, h);

  const P = currentPalette;            // 現在 workspace の色 + 模様パラメータ
  ctx.lineWidth = P.width;
  ctx.lineCap = 'round';

  for (const p of particles) {
    // fractal ノイズ場から角度算出 (workspace毎に scale/twist/速度が異なる)
    const n = fbm(p.x * P.scale, p.y * P.scale + frame * P.drift);
    const angle = n * Math.PI * P.twist;
    const speed = P.speed;
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed;

    // 色: アクセント2色を noise で RGB 補間 → 朝夕は gold へ寄せ → 時刻明度を乗算
    const mix = (n + 1) * 0.5;                 // 0..1
    const warm = t.warmth * 0.35;              // 朝夕で最大35% gold 寄せ
    const br = t.brightness;
    let mr = aR + (bR - aR) * mix;
    let mg = aG + (bG - aG) * mix;
    let mb = aB + (bB - aB) * mix;
    mr += (gR - mr) * warm;
    mg += (gG - mg) * warm;
    mb += (gB - mb) * warm;
    const cr = Math.min(255, mr * br) | 0;
    const cg = Math.min(255, mg * br) | 0;
    const cb = Math.min(255, mb * br) | 0;
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.7)`;

    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    p.x += vx;
    p.y += vy;
    ctx.lineTo(p.x, p.y);
    ctx.stroke();

    // 寿命管理: 一定時間で再生成
    p.life--;
    if (p.life < 0 || p.x < 0 || p.x > w || p.y < 0 || p.y > h) {
      p.x = Math.random() * w;
      p.y = Math.random() * h;
      p.life = 150 + Math.random() * 200;
    }
  }

  frame++;
  requestAnimationFrame(tick);  // 停止せず回し続ける
}

// 初期描画: 初回アニメーションを一度走らせる (startAnimation 内で base も塗る)
applyWorkspace('1');
startAnimation();
</script>
</body>
</html>
