[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

# jump-to-char: vim 風に頭文字でジャンプ (f)
[[mgr.prepend_keymap]]
on   = "f"
run  = "plugin jump-to-char"
desc = "Jump to a file/dir by its first char"

# smart-filter: インクリメンタル絞り込み + 自動 dir 侵入 (F)
[[mgr.prepend_keymap]]
on   = "F"
run  = "plugin smart-filter"
desc = "Smart filter"

# smart-paste: hover 中の dir に貼り付け (無ければ cwd) (p で上書き)
[[mgr.prepend_keymap]]
on   = "p"
run  = "plugin smart-paste"
desc = "Paste into the hovered directory, or cwd"
