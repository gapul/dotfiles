# QoL 設定 (見た目は既定のまま、情報量と操作性だけ向上)
[mgr]
linemode       = "size" # 各行にファイルサイズを表示
show_hidden    = false # dotfiles を常に表示 (毎回 . トグル不要)
sort_dir_first = true # ディレクトリを先頭に
scrolloff      = 5 # カーソル上下に5行の余白

[opener]
# プラットフォーム指定の方針:
#   - 両 Unix で同じコマンドなら for = "unix" (mac + linux 兼用)
#   - mac/linux でコマンドが違うものは for = "macos" / "linux" を個別指定
#     (yazi は "linux" 限定値に対応。"unix" は mac も含むので linux 専用に使えない)
#   - Windows の run は cmd.exe /C 実行。`start "" "$@"` で既定アプリ起動、
#     `tar -xf` は Windows 10+ 同梱の bsdtar.exe (zip/tar/gz/bz2 対応)。
video = [
  { run = 'mpv "$@"', desc = "Open in mpv", orphan = true, for = "unix" },
  { run = 'open -a "IINA" "$@"', desc = "Open in IINA", orphan = true, for = "macos" },
  { run = 'mpv "$@"', desc = "Open in mpv", orphan = true, for = "windows" },
  { run = 'start "" "$@"', desc = "Open with default", orphan = true, for = "windows" },
]
audio = [
  { run = 'mpv "$@"', desc = "Play in mpv", orphan = true, for = "unix" },
  { run = 'open -a "IINA" "$@"', desc = "Play in IINA", orphan = true, for = "macos" },
  { run = 'mpv "$@"', desc = "Play in mpv", orphan = true, for = "windows" },
  { run = 'start "" "$@"', desc = "Play with default", orphan = true, for = "windows" },
]
image = [
  { run = 'open -a qView "$@"', desc = "Open in qView", orphan = true, for = "macos" },
  { run = 'open -a PicView "$@"', desc = "Open in PicView", orphan = true, for = "macos" },
  { run = 'qlmanage -p "$@"', desc = "Quick Look", orphan = true, for = "macos" },
  { run = 'open -a "Preview" "$@"', desc = "Open in Preview", orphan = true, for = "macos" },
  { run = 'xdg-open "$@"', desc = "Open (xdg)", orphan = true, for = "linux" },
  { run = 'start "" "$@"', desc = "Open with default", orphan = true, for = "windows" },
]
office = [
  { run = 'open -a "LibreOffice" "$@"', desc = "Open in LibreOffice", orphan = true, for = "macos" },
  { run = 'libreoffice "$@"', desc = "Open in LibreOffice", orphan = true, for = "linux" },
  { run = 'start "" "$@"', desc = "Open with default (Word/Excel/PPT)", orphan = true, for = "windows" },
]
pdf = [
  { run = 'open -a sioyek "$@"', desc = "Open in Sioyek", orphan = true, for = "macos" },
  { run = 'open -a "Preview" "$@"', desc = "Open in Preview", orphan = true, for = "macos" },
  { run = 'zathura "$@"', desc = "Open in Zathura", orphan = true, for = "linux" },
  { run = 'start "" "$@"', desc = "Open with default", orphan = true, for = "windows" },
]
edit = [
  { run = 'nvim "$@"', desc = "Edit in Neovim", block = true, for = "unix" },
  { run = 'nvim "$@"', desc = "Edit in Neovim", block = true, for = "windows" },
]
extract = [
  { run = 'unzip -o "$1" -d "$(dirname "$1")"', desc = "Extract zip here", for = "unix" },
  { run = 'tar -xvf "$1" -C "$(dirname "$1")"', desc = "Extract tar here", for = "unix" },
  { run = 'open "$@"', desc = "Open with Archive Utility", orphan = true, for = "macos" },
  # Windows: 7zip 優先 (rar/7z/zip 全部対応)、fallback で bsdtar (Win 10+ 標準)
  { run = '7z x "$1" -o"$(dirname "$1")" -y', desc = "Extract here (7-Zip)", for = "windows" },
  { run = 'tar -xf "$1"', desc = "Extract here (bsdtar)", for = "windows" },
]
fallback = [
  { run = 'open "$@"', desc = "Open with macOS default", orphan = true, for = "macos" },
  { run = 'xdg-open "$@"', desc = "Open with Linux default", orphan = true, for = "linux" },
  { run = 'start "" "$@"', desc = "Open with Windows default", orphan = true, for = "windows" },
]

[open]
prepend_rules = [
  # Text / code (MIME)
  { mime = "text/*", use = "edit" },
  { mime = "application/{json,xml,javascript,x-yaml,x-toml,x-shellscript}", use = "edit" },

  # Source / config files (glob)
  { url = "*.{md,markdown,txt,log,conf,cfg,ini,toml,yaml,yml,json,xml,html,css,scss,js,jsx,ts,tsx,vue,svelte,py,rb,go,rs,c,h,cpp,hpp,cc,hh,java,kt,swift,sh,bash,zsh,fish,lua,vim,nix,sql,env}", use = "edit" },
  { url = "*.{dockerfile,Dockerfile}", use = "edit" },
  { url = "{.zshrc,.bashrc,.gitconfig,.gitignore,.editorconfig,Makefile,Justfile,justfile,Dockerfile,flake.nix,*.lock}", use = "edit" },

  # Media
  { mime = "video/*", use = "video" },
  { mime = "audio/*", use = "audio" },
  { mime = "image/*", use = "image" },

  # Office
  { mime = "application/{msword,vnd.ms-excel,vnd.ms-powerpoint}", use = "office" },
  { mime = "application/vnd.openxmlformats-officedocument.*", use = "office" },
  { mime = "application/vnd.oasis.opendocument.*", use = "office" },
  { url = "*.{doc,docx,xls,xlsx,ppt,pptx,odt,ods,odp}", use = "office" },

  # PDF
  { mime = "application/pdf", use = "pdf" },
  { url = "*.pdf", use = "pdf" },

  # Archives
  { mime = "application/{zip,x-tar,gzip,x-bzip2,x-7z-compressed,vnd.rar,x-rar,x-xz}", use = "extract" },
  { url = "*.{zip,tar,gz,tgz,tar.gz,bz2,tbz2,tar.bz2,xz,txz,tar.xz,7z,rar}", use = "extract" },
]

append_rules = [
  # Fallback (after defaults)
  { url = "*", use = "fallback" },
]

[preview]
max_width     = 1920
max_height    = 1080
image_filter  = "lanczos3"
image_quality = 90

[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"

# ─── プレビュー強化 (各ツールは home.packages / apps.json で導入) ───
# 各 CLI を直接呼ぶ。yazi の $w (preview pane width) は run 内で展開される。
# CLICOLOR_FORCE は yazi が CLI に渡す TTY を non-tty 化するため必要 (色を強制)。

# Markdown を glow でレンダリング表示
[[plugin.prepend_previewers]]
url = "*.md"
run  = 'CLICOLOR_FORCE=1 glow -w=$w "$1"'

# JSON を jq で整形 + 色付け
[[plugin.prepend_previewers]]
url = "*.{json,jsonc}"
run  = 'CLICOLOR_FORCE=1 jq -C . "$1"'

# CSV/TSV を rich でテーブル表示
[[plugin.prepend_previewers]]
url = "*.{csv,tsv}"
run  = 'rich "$1" --csv --force-terminal --width=$w'

# 書庫の中身一覧を ouch で表示
[[plugin.prepend_previewers]]
mime = "application/{zip,gzip,x-tar,x-bzip2,x-xz,x-7z-compressed,x-rar,vnd.rar}"
run  = 'ouch list "$1"'

# 動画は ffmpegthumbnailer (yazi 内蔵 video previewer が自動使用。ルール不要)
