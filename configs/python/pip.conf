# Pip configuration for Nix integration
# This configuration prioritizes Nix-managed packages

[global]
# Prefer Nix store when possible
find-links = /nix/store

# Disable pip warnings about PATH
disable-pip-version-check = true

# Use user directory for manual installs (fallback only)
user = true

# Timeout settings
timeout = 60

# Progress display
progress-bar = pretty

[install]
# Prefer wheels when available
prefer-binary = true

# Require hashes for security (can be disabled for development)
# require-hashes = true

# Upgrade dependencies by default
upgrade = false

[freeze]
# Exclude system packages from freeze
exclude-editable = true

[list]
# Format for better readability
format = columns