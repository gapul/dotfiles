# Cargo configuration for Nix integration
# This file goes in ~/.cargo/config.toml

[cargo-new]
# Default template for new Rust projects
vcs = "git"

[build]
# Use Nix-provided tools when available
rustc-wrapper = "sccache"  # If available
# jobs = 4  # Limit parallel jobs if needed

[registry]
# Use default registry (crates.io)
# Could be configured for private registries if needed

[net]
# Network configuration
retry = 2
git-fetch-with-cli = false

[profile.dev]
# Development profile optimizations
debug = true
opt-level = 0
overflow-checks = true

[profile.release]
# Release profile for production builds
debug = false
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[alias]
# Useful cargo aliases
c = "check"
b = "build"
r = "run"
t = "test"
fmt = "fmt --all"
clippy = "clippy --all-targets --all-features"

# Common development commands
dev = "watch -x check"
quick = "check --all-targets"
cov = "tarpaulin --out Html"