# Development environment overrides
version: '3.8'

services:
  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - FAST_REFRESH=true
      - WDS_SOCKET_HOST=localhost
    ports:
      - "3000:3000"

  backend:
    build:
      target: default
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DEBUG=*
      - NODEMON_EXEC_TIMEOUT=10
    ports:
      - "8000:8000"
      - "9229:9229"  # Debug port

  database:
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_LOG_STATEMENT=all
    command: >
      postgres
      -c log_statement=all
      -c log_destination=stderr
      -c log_min_duration_statement=0

  redis:
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --loglevel verbose

  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"

# Development tools
  adminer:
    image: adminer:latest
    container_name: {{PROJECT_NAME}}-adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=database
    depends_on:
      - database
    networks:
      - app-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: {{PROJECT_NAME}}-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=redis:redis:6379
    depends_on:
      - redis
    networks:
      - app-network