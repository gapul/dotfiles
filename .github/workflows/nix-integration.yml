name: Nix Integration Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'nix/**'
      - 'scripts/nix-*'
      - 'scripts/phase3-*'
      - '.github/workflows/nix-integration.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'nix/**'
      - 'scripts/nix-*'
      - 'scripts/phase3-*'
      - '.github/workflows/nix-integration.yml'

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  nix-validation:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Determinate Nix
      uses: DeterminateSystems/nix-installer-action@v17
      
    - name: Setup Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@v11
      
    - name: Validate Nix Flake
      run: |
        # Change to correct Nix directory with fallback
        cd nix/platforms || cd nix || { echo "❌ Nix directory not found"; exit 1; }
        
        echo "🔍 Validating Nix flake..."
        nix flake check --show-trace --impure
        
    - name: Test Nix Build (Development Shells)
      run: |
        # Change to correct Nix directory with fallback
        cd nix/platforms || cd nix || { echo "❌ Nix directory not found"; exit 1; }
        
        echo "🐚 Testing development shells..."
        
        # Detect current system
        SYSTEM=$(nix eval --impure --expr 'builtins.currentSystem' --raw)
        echo "Current system: $SYSTEM"
        
        # Test default development shell
        if nix eval .#devShells.$SYSTEM.default --json >/dev/null 2>&1; then
          echo "✅ Default shell available, testing..."
          nix develop .#default --command echo "Default shell works" || echo "⚠️ Default shell test failed"
        else
          echo "⚠️ Default shell not available"
        fi
        
        # Test if development shells exist before testing
        if nix eval .#devShells.$SYSTEM.python --json >/dev/null 2>&1; then
          echo "✅ Python shell available, testing..."
          nix develop .#python --command python --version || echo "⚠️ Python shell test failed"
        else
          echo "ℹ️ Python shell not available on this platform"
        fi
        
        if nix eval .#devShells.$SYSTEM.node --json >/dev/null 2>&1; then
          echo "✅ Node shell available, testing..."
          nix develop .#node --command node --version || echo "⚠️ Node shell test failed"
        else
          echo "ℹ️ Node shell not available on this platform"
        fi
        
    - name: Test Package Availability
      run: |
        nix search nixpkgs yabai --json | jq '.["legacyPackages.aarch64-darwin.yabai"]'
        nix search nixpkgs skhd --json | jq '.["legacyPackages.aarch64-darwin.skhd"]'
        nix search nixpkgs sketchybar --json | jq '.["legacyPackages.aarch64-darwin.sketchybar"]'
        
    - name: Validate Maintenance Scripts
      run: |
        bash -n scripts/nix-maintenance.sh
        bash -n scripts/phase3-migration.sh
        bash -n scripts/nix-shortcuts.sh
        
    - name: Test Maintenance Script Functions
      run: |
        # Test help commands (non-destructive)
        scripts/nix-maintenance.sh help
        scripts/phase3-migration.sh help
        
    - name: Check Homebrew Integration
      run: |
        if command -v brew >/dev/null 2>&1; then
          brew bundle check --no-lock || true
        fi

  dependency-analysis:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Determinate Nix
      uses: DeterminateSystems/nix-installer-action@v17
      
    - name: Analyze Package Dependencies
      run: |
        # Change to correct Nix directory with fallback
        cd nix/platforms || cd nix || { echo "❌ Nix directory not found"; exit 1; }
        
        echo "🔍 Analyzing package dependencies..."
        
        # Test if the configuration evaluates successfully with --impure flag
        if nix eval .#darwinConfigurations.default.system --json --impure >/dev/null 2>&1; then
          echo "✅ Darwin configuration evaluates successfully"
          
          # Try to evaluate system packages if accessible
          if nix eval .#darwinConfigurations.default.config.environment.systemPackages --json --impure > /tmp/nix-packages.json 2>/dev/null; then
            echo "✅ System packages evaluation successful"
            
            # Check package count
            package_count=$(jq length /tmp/nix-packages.json)
            echo "📦 System packages count: $package_count"
            
            # Validate no conflicting packages
            if cat /tmp/nix-packages.json | jq -r '.[] | select(. | contains("yabai"))' | grep -q yabai 2>/dev/null; then
              echo "⚠️ Warning: yabai found in systemPackages - should be in homebrew.brews"
            else
              echo "✅ yabai correctly managed via Homebrew"
            fi
          else
            echo "⚠️ Could not evaluate system packages directly, but configuration is valid"
          fi
        else
          echo "❌ Darwin configuration evaluation failed"
          exit 1
        fi
        
    - name: Generate Dependency Report
      run: |
        echo "# Nix Package Dependency Report" > dependency-report.md
        echo "Generated: $(date)" >> dependency-report.md
        echo "" >> dependency-report.md
        
        # Change to correct Nix directory with fallback
        cd nix/platforms || cd nix || { echo "❌ Nix directory not found"; exit 1; }
        
        echo "## Configuration Status" >> dependency-report.md
        if nix eval .#darwinConfigurations.default.system --json --impure >/dev/null 2>&1; then
          echo "- ✅ Darwin configuration evaluates successfully" >> dependency-report.md
        else
          echo "- ❌ Darwin configuration evaluation failed" >> dependency-report.md
        fi
        
        echo "" >> dependency-report.md
        echo "## Development Shells" >> dependency-report.md
        
        # Detect current system
        SYSTEM=$(nix eval --impure --expr 'builtins.currentSystem' --raw)
        echo "Current system: $SYSTEM" >> dependency-report.md
        echo "" >> dependency-report.md
        
        # Test development shells with fallbacks
        for shell in default python node rust; do
          if nix eval .#devShells.$SYSTEM.$shell --json >/dev/null 2>&1; then
            echo "- ✅ $shell: Available" >> dependency-report.md
          else
            echo "- ❌ $shell: Not available" >> dependency-report.md
          fi
        done
        
    - name: Upload Dependency Report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: dependency-report.md

  security-scan:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Scan for Secrets
      run: |
        # Check for hardcoded secrets in nix files
        ! grep -r "password\|secret\|key\|token" nix/ --include="*.nix" || echo "Warning: Potential secrets found"
        
    - name: Validate Security Practices
      run: |
        # Ensure no sensitive files are tracked
        if [ -f nix/secrets.nix ]; then
          echo "Error: secrets.nix should not be tracked"
          exit 1
        fi
        
        # Check .gitignore coverage
        grep -q "secrets" .gitignore || echo "Warning: secrets not in .gitignore"
        
    - name: Check Script Permissions
      run: |
        find scripts/ -name "*.sh" -not -perm -u+x | while read file; do
          echo "Warning: $file is not executable"
        done

  performance-benchmark:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Determinate Nix
      uses: DeterminateSystems/nix-installer-action@v17
      
    - name: Benchmark Nix Operations
      run: |
        echo "# Nix Performance Benchmark" > benchmark-report.md
        echo "Generated: $(date)" >> benchmark-report.md
        echo "" >> benchmark-report.md
        
        # Change to correct Nix directory with fallback
        cd nix/platforms || cd nix || { echo "❌ Nix directory not found"; exit 1; }
        
        # Detect current system
        SYSTEM=$(nix eval --impure --expr 'builtins.currentSystem' --raw)
        echo "Current system: $SYSTEM" >> benchmark-report.md
        echo "" >> benchmark-report.md
        
        # Time flake check
        echo "## Flake Validation Time" >> benchmark-report.md
        time nix flake check --impure 2>&1 | tee -a ../benchmark-report.md
        
        # Time development shell activation
        echo "## Development Shell Activation Time" >> benchmark-report.md
        if nix eval .#devShells.$SYSTEM.python --json >/dev/null 2>&1; then
          time nix develop .#python --command echo "Python shell ready" 2>&1 | tee -a ../benchmark-report.md
        else
          echo "Python shell not available on $SYSTEM" >> benchmark-report.md
        fi
        
        # Store size analysis
        echo "## Store Analysis" >> benchmark-report.md
        if nix eval .#devShells.$SYSTEM.python --json >/dev/null 2>&1; then
          nix build .#devShells.$SYSTEM.python --no-link --print-out-paths | head -1 | xargs nix path-info --closure-size --human-readable >> benchmark-report.md 2>/dev/null || echo "Store analysis failed" >> benchmark-report.md
        else
          echo "Cannot analyze store - Python shell not available" >> benchmark-report.md
        fi
        
    - name: Upload Benchmark Report
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-report
        path: benchmark-report.md