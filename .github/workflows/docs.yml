name: Documentation Generation and GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'nix/**'
      - 'README.md'
      - 'SECURITY.md'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Nix
        uses: cachix/install-nix-action@v24
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            
      - name: Install documentation tools
        run: |
          npm install -g @mermaid-js/mermaid-cli
          sudo apt-get update
          sudo apt-get install -y pandoc graphviz
          
      - name: Create docs output directory
        run: mkdir -p docs-generated
        
      - name: Generate Nix configuration documentation
        run: |
          echo "📚 Generating Nix configuration documentation..."
          
          # Generate flake.nix documentation
          cat > docs-generated/nix-configuration.md << 'EOF'
          # Nix Configuration Documentation
          
          ## Overview
          
          This dotfiles system uses Nix and home-manager for declarative system configuration across multiple platforms.
          
          ## Supported Platforms
          
          - **macOS**: nix-darwin with home-manager integration
          - **Linux**: Standalone home-manager or NixOS
          - **WSL**: home-manager for Windows Subsystem for Linux
          - **Android**: nix-on-droid for Termux environments
          - **GitHub Codespaces**: Cloud development environments
          
          ## Configuration Structure
          
          EOF
          
          # Generate file tree
          echo '```' >> docs-generated/nix-configuration.md
          tree nix/ -I 'result*' >> docs-generated/nix-configuration.md 2>/dev/null || find nix/ -type f -name "*.nix" | head -20 >> docs-generated/nix-configuration.md
          echo '```' >> docs-generated/nix-configuration.md
          
          # Generate module documentation
          echo "## Available Modules" >> docs-generated/nix-configuration.md
          echo "" >> docs-generated/nix-configuration.md
          
          find nix/ -name "*.nix" -type f | while read -r file; do
            if [[ "$file" =~ default\.nix$ ]]; then
              module_name=$(dirname "$file" | sed 's|nix/||' | sed 's|/|-|g')
              echo "### $module_name" >> docs-generated/nix-configuration.md
              echo "" >> docs-generated/nix-configuration.md
              
              # Extract comments and configuration options
              if grep -q "options\." "$file"; then
                echo "**Configuration options:**" >> docs-generated/nix-configuration.md
                grep -n "options\." "$file" | head -5 >> docs-generated/nix-configuration.md
                echo "" >> docs-generated/nix-configuration.md
              fi
              
              echo "**File:** \`$file\`" >> docs-generated/nix-configuration.md
              echo "" >> docs-generated/nix-configuration.md
            fi
          done
          
      - name: Generate API documentation
        run: |
          echo "📖 Generating API documentation..."
          
          cat > docs-generated/api-reference.md << 'EOF'
          # API Reference
          
          ## Shell Functions
          
          ### Dotfiles Management
          
          | Function | Description | Usage |
          |----------|-------------|-------|
          | `dotfiles-rebuild` | Rebuild system configuration | `dotfiles-rebuild` |
          | `dotfiles-health` | Run health check | `dotfiles-health` |
          | `dotfiles-status` | Show system status | `dotfiles-status` |
          
          ### GitHub Integration
          
          | Function | Description | Usage |
          |----------|-------------|-------|
          | `copilot-cmd` | Get command suggestions | `copilot-cmd "description"` |
          | `copilot-explain-file` | Explain code file | `copilot-explain-file file.nix` |
          | `gh-quick-pr` | Quick PR creation | `gh-quick-pr "title" "body"` |
          
          ## Command Line Tools
          
          ### Core Tools
          
          - `claude` - Claude Code AI assistant
          - `gh` - GitHub CLI
          - `just` - Task runner
          - `nix` - Nix package manager
          - `home-manager` - Home environment manager
          
          ### Development Tools
          
          - `starship` - Modern shell prompt
          - `bat` - Enhanced cat command
          - `eza` - Modern ls replacement
          - `fd` - Fast find alternative
          - `rg` (ripgrep) - Fast grep alternative
          
          ## Configuration Files
          
          | File | Purpose | Platform |
          |------|---------|----------|
          | `nix/flake.nix` | Main configuration entry | All |
          | `nix/darwin/default.nix` | macOS system config | macOS |
          | `nix/linux/default.nix` | Linux home config | Linux |
          | `nix/codespaces/default.nix` | Codespaces config | Codespaces |
          
          EOF
          
      - name: Generate installation guide
        run: |
          echo "🔧 Generating installation guide..."
          
          cat > docs-generated/installation.md << 'EOF'
          # Installation Guide
          
          ## Quick Start
          
          ### Automated Installation (Recommended)
          
          ```bash
          # Install via NPM package
          npm install -g @gapul/dotfiles-tooling
          dotfiles-install
          ```
          
          ### Manual Installation
          
          ```bash
          # Clone repository
          git clone https://github.com/gapul/dotfiles.git ~/.config/dotfiles
          cd ~/.config/dotfiles
          
          # Run installation script
          ./install.sh
          ```
          
          ## Platform-Specific Setup
          
          ### macOS (nix-darwin)
          
          ```bash
          # Install Nix
          sh <(curl -L https://nixos.org/nix/install)
          
          # Apply configuration
          cd ~/.config/dotfiles/nix
          sudo nix run nix-darwin -- switch --flake .#default
          ```
          
          ### Linux (home-manager)
          
          ```bash
          # Install Nix
          sh <(curl -L https://nixos.org/nix/install) --daemon
          
          # Install home-manager
          nix-channel --add https://github.com/nix-community/home-manager/archive/master.tar.gz home-manager
          nix-channel --update
          nix-shell '<home-manager>' -A install
          
          # Apply configuration
          home-manager switch --flake ~/.config/dotfiles#$USER@linux
          ```
          
          ### GitHub Codespaces
          
          Codespaces automatically uses the `.devcontainer` configuration:
          
          1. Open repository in Codespaces
          2. Wait for automatic setup to complete
          3. Run `dotfiles-rebuild` to apply configuration
          
          ### WSL (Windows Subsystem for Linux)
          
          ```bash
          # Enable systemd (WSL2)
          echo '[boot]\nsystemd=true' | sudo tee -a /etc/wsl.conf
          wsl --shutdown
          
          # Install Nix (after restart)
          sh <(curl -L https://nixos.org/nix/install) --daemon
          
          # Apply configuration
          home-manager switch --flake ~/.config/dotfiles#$USER@wsl
          ```
          
          ## Troubleshooting
          
          ### Common Issues
          
          **Nix installation fails**
          ```bash
          # Ensure you have sufficient permissions
          sudo mkdir -p /nix
          sudo chown $(whoami) /nix
          ```
          
          **Home-manager build fails**
          ```bash
          # Check for syntax errors
          cd ~/.config/dotfiles/nix
          nix flake check --impure
          ```
          
          **macOS system rebuild fails**
          ```bash
          # Check Darwin configuration
          nix eval .#darwinConfigurations.default.system
          ```
          
          ### Health Checks
          
          ```bash
          # Run platform-specific health check
          cd ~/.config/dotfiles
          ./macos-health-check.sh      # macOS
          ./system-health-check.sh     # Linux/WSL
          ```
          
          ### Getting Help
          
          - 📚 [Documentation](https://gapul.github.io/dotfiles/)
          - 💬 [GitHub Discussions](https://github.com/gapul/dotfiles/discussions)
          - 🐛 [Issue Tracker](https://github.com/gapul/dotfiles/issues)
          - 🔒 [Security Issues](https://github.com/gapul/dotfiles/security/advisories/new)
          
          EOF
          
      - name: Generate changelog
        run: |
          echo "📝 Generating changelog..."
          
          # Create changelog from git history
          cat > docs-generated/changelog.md << 'EOF'
          # Changelog
          
          All notable changes to this project will be documented in this file.
          
          The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
          and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
          
          EOF
          
          # Get recent commits and organize by type
          echo "## Recent Changes" >> docs-generated/changelog.md
          echo "" >> docs-generated/changelog.md
          
          git log --oneline --since="1 month ago" | while read -r commit; do
            if [[ "$commit" =~ ^[a-f0-9]+[[:space:]]+(feat|fix|docs|chore|refactor)(\(.+\))?:[[:space:]]+ ]]; then
              echo "- $commit" >> docs-generated/changelog.md
            fi
          done
          
      - name: Create site index
        run: |
          echo "🏠 Creating site index..."
          
          cat > docs-generated/index.md << 'EOF'
          # gapul/dotfiles Documentation
          
          Welcome to the comprehensive documentation for the dotfiles management system.
          
          ## 🚀 Quick Links
          
          - [Installation Guide](installation.html) - Get started quickly
          - [Nix Configuration](nix-configuration.html) - System configuration details
          - [API Reference](api-reference.html) - Functions and commands
          - [Changelog](changelog.html) - Recent changes
          
          ## 🏗️ System Overview
          
          This dotfiles system provides:
          
          - **Declarative Configuration**: Using Nix and home-manager
          - **Multi-Platform Support**: macOS, Linux, WSL, Android, Codespaces
          - **Security**: SOPS encryption and security scanning
          - **AI Integration**: GitHub Copilot and Claude Code
          - **Automation**: CI/CD with GitHub Actions
          
          ## 📊 Statistics
          
          EOF
          
          # Add some statistics
          echo "- **Total Nix Files**: $(find nix/ -name "*.nix" | wc -l)" >> docs-generated/index.md
          echo "- **Supported Platforms**: 6 (macOS, Linux, WSL, Android, Codespaces, NixOS)" >> docs-generated/index.md
          echo "- **GitHub Actions**: $(ls .github/workflows/*.yml | wc -l) workflows" >> docs-generated/index.md
          echo "- **Last Updated**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> docs-generated/index.md
          
      - name: Convert Markdown to HTML
        run: |
          echo "🔄 Converting Markdown to HTML..."
          
          # Create HTML template
          cat > template.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>$title$ - gapul/dotfiles</title>
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
              <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
              <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
              <style>
                  body {
                      box-sizing: border-box;
                      min-width: 200px;
                      max-width: 980px;
                      margin: 0 auto;
                      padding: 45px;
                      background-color: #ffffff;
                  }
                  .markdown-body {
                      box-sizing: border-box;
                      min-width: 200px;
                      max-width: 980px;
                      margin: 0 auto;
                  }
                  nav {
                      background-color: #f6f8fa;
                      padding: 16px;
                      margin-bottom: 32px;
                      border-radius: 6px;
                      border: 1px solid #d0d7de;
                  }
                  nav ul {
                      list-style: none;
                      padding: 0;
                      margin: 0;
                      display: flex;
                      flex-wrap: wrap;
                      gap: 16px;
                  }
                  nav a {
                      text-decoration: none;
                      color: #0969da;
                      font-weight: 500;
                  }
                  nav a:hover {
                      text-decoration: underline;
                  }
                  .header {
                      text-align: center;
                      margin-bottom: 32px;
                      padding-bottom: 16px;
                      border-bottom: 1px solid #d0d7de;
                  }
                  .footer {
                      margin-top: 64px;
                      padding-top: 16px;
                      border-top: 1px solid #d0d7de;
                      text-align: center;
                      font-size: 14px;
                      color: #656d76;
                  }
              </style>
          </head>
          <body>
              <div class="header">
                  <h1>🏠 gapul/dotfiles</h1>
                  <p>Modern, secure, multi-platform dotfiles management</p>
              </div>
              
              <nav>
                  <ul>
                      <li><a href="index.html">🏠 Home</a></li>
                      <li><a href="installation.html">🔧 Installation</a></li>
                      <li><a href="nix-configuration.html">⚙️ Configuration</a></li>
                      <li><a href="api-reference.html">📖 API Reference</a></li>
                      <li><a href="changelog.html">📝 Changelog</a></li>
                      <li><a href="https://github.com/gapul/dotfiles">📱 GitHub</a></li>
                  </ul>
              </nav>
              
              <article class="markdown-body">
                  $body$
              </article>
              
              <div class="footer">
                  <p>Generated automatically from <a href="https://github.com/gapul/dotfiles">gapul/dotfiles</a></p>
                  <p>Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")</p>
              </div>
          </body>
          </html>
          EOF
          
          # Convert all markdown files to HTML
          for md_file in docs-generated/*.md; do
            html_file="${md_file%.md}.html"
            pandoc "$md_file" --template=template.html --standalone --output="$html_file"
            echo "Converted $md_file to $html_file"
          done
          
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs-generated/
          
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: generate-docs
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: docs-generated/
          
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-generated/
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4