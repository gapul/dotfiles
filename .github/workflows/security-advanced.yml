name: Advanced GitHub Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily security scans at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

jobs:
  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'python']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js for JavaScript analysis
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Setup Python for Python analysis
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies for JavaScript
        if: matrix.language == 'javascript'
        run: |
          # Install JavaScript dependencies if package.json exists
          if [[ -f "package.json" ]]; then
            npm ci
          elif [[ -f ".devcontainer/package.json" ]]; then
            cd .devcontainer && npm ci
          else
            # Create minimal package.json for CodeQL analysis
            echo '{"name": "dotfiles", "version": "1.0.0", "private": true}' > package.json
            npm install
          fi
          
      - name: Install dependencies for Python
        if: matrix.language == 'python'
        run: |
          # Install Python dependencies if requirements exist
          if [[ -f "requirements.txt" ]]; then
            pip install -r requirements.txt
          elif [[ -f ".github/scripts/requirements.txt" ]]; then
            pip install -r .github/scripts/requirements.txt
          else
            # Install common dependencies for script analysis
            pip install tomli PyYAML requests
          fi
        
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config: |
            name: "Dotfiles CodeQL Config"
            disable-default-queries: false
            queries:
              - uses: security-extended
              - uses: security-and-quality
            paths:
              - ".github/scripts/**"
              - "scripts/**"
              - "*.js"
              - "*.py"
              - "nix/**/*.py"
              - ".devcontainer/**"
            paths-ignore:
              - "**/*.md"
              - "**/*.txt"
              - "**/*.json"
              - "**/*.toml"
              - "**/*.yml"
              - "**/*.yaml"
              - "**/node_modules/**"
              - "**/__pycache__/**"
              - "**/venv/**"
              - "**/.*"
              
      - name: Manual build for dotfiles project
        run: |
          echo "📦 Preparing dotfiles project for CodeQL analysis..."
          
          # Create analysis-friendly structure for JavaScript
          if [[ "${{ matrix.language }}" == "javascript" ]]; then
            echo "🔍 Analyzing JavaScript files..."
            find . -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*" | head -10
            
            # Ensure package.json exists for proper analysis
            if [[ ! -f "package.json" && -f ".devcontainer/package.json" ]]; then
              cp .devcontainer/package.json package.json
            fi
          fi
          
          # Create analysis-friendly structure for Python
          if [[ "${{ matrix.language }}" == "python" ]]; then
            echo "🔍 Analyzing Python files..."
            find . -name "*.py" -not -path "./.git/*" -not -path "./venv/*" -not -path "./__pycache__/*" | head -10
            
            # Ensure Python files are discoverable
            find .github/scripts -name "*.py" -exec python3 -m py_compile {} \; 2>/dev/null || true
          fi
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
          upload: true

  dependency-review:
    name: Dependency Security Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0
          comment-summary-in-pr: true

  secrets-scanning:
    name: Advanced Secrets Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: TruffleHog OSS Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified --no-update
        continue-on-error: true
          
      - name: GitLeaks Secret Detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
          
      - name: Semgrep Security Analysis
        if: vars.SEMGREP_APP_TOKEN != ''
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/dockerfile
        env:
          SEMGREP_APP_TOKEN: ${{ vars.SEMGREP_APP_TOKEN }}
        continue-on-error: true
        
      - name: Manual Secret Pattern Detection
        run: |
          echo "🔍 Running manual secret pattern detection..."
          
          # Define patterns to search for
          declare -a patterns=(
            "password\s*[:=]\s*['\"][^'\"]{8,}['\"]"
            "api[_-]?key\s*[:=]\s*['\"][^'\"]{20,}['\"]"
            "secret\s*[:=]\s*['\"][^'\"]{10,}['\"]"
            "token\s*[:=]\s*['\"][^'\"]{20,}['\"]"
            "-----BEGIN [A-Z ]+-----"
            "ssh-rsa [A-Za-z0-9+/]{200,}"
            "AKIA[0-9A-Z]{16}"
            "sk_live_[0-9a-zA-Z]{24}"
          )
          
          found_issues=false
          
          for pattern in "${patterns[@]}"; do
            echo "Checking pattern: $pattern"
            if grep -r -E "$pattern" . \
                --exclude-dir=.git \
                --exclude-dir=node_modules \
                --exclude-dir=venv \
                --exclude="*.md" \
                --exclude="*.log" \
                --exclude="*.lock" \
                --exclude-dir=.github 2>/dev/null; then
              echo "⚠️ Potential secret pattern found: $pattern"
              found_issues=true
            fi
          done
          
          if [[ "$found_issues" == "false" ]]; then
            echo "✅ No obvious secret patterns detected"
          else
            echo "⚠️ Manual review recommended for flagged patterns"
          fi
          
      - name: Check for example/template secrets
        run: |
          echo "🔍 Checking for example/template files with secrets..."
          
          # Check .example files
          find . -name "*.example" -type f | while read -r file; do
            echo "Checking example file: $file"
            if grep -E "(password|secret|key|token)" "$file" 2>/dev/null; then
              echo "ℹ️ Example file contains credential placeholders: $file"
            fi
          done
          
          # Check for SOPS encrypted files
          find . -name "*.yaml" -o -name "*.yml" | while read -r file; do
            if grep -q "sops:" "$file" 2>/dev/null; then
              echo "✅ SOPS encrypted file detected: $file"
            fi
          done
          
          echo "✅ Example/template file check completed"

  container-security:
    name: Container Security Scanning
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Build Docker image for scanning
        run: |
          docker build -t dotfiles-security-scan:latest -f .devcontainer/Dockerfile .
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'dotfiles-security-scan:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          
      - name: Docker Scout CVE scanning
        uses: docker/scout-action@v1
        if: ${{ github.event_name != 'pull_request' }}
        with:
          command: cves
          image: dotfiles-security-scan:latest
          sarif-file: scout-cves.sarif
          
      - name: Upload Docker Scout scan results
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          sarif_file: scout-cves.sarif

  nix-security:
    name: Nix Configuration Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            
      - name: Security audit of Nix packages
        run: |
          echo "🔍 Auditing Nix configuration for security issues..."
          
          # Change to correct directory
          cd nix/platforms || cd nix || { echo "Nix directory not found"; exit 1; }
          
          # Check if flake exists and is valid
          if [[ -f "flake.nix" ]]; then
            echo "✅ Flake configuration found"
            
            # List flake outputs safely
            if nix flake show --json > flake-outputs.json 2>/dev/null; then
              echo "✅ Flake outputs retrieved successfully"
              jq -r 'keys[]' flake-outputs.json 2>/dev/null || echo "No outputs to display"
            else
              echo "⚠️ Could not retrieve flake outputs"
            fi
          else
            echo "❌ No flake.nix found in expected locations"
          fi
          
          # Check for hardcoded secrets in Nix files with better filtering
          echo "Scanning Nix files for potential secrets..."
          secrets_found=false
          
          find . -name "*.nix" -type f | while read -r file; do
            # Skip certain patterns that are likely false positives
            if grep -E "(password|secret|key|token)" "$file" | grep -v -E "(password.*=.*\[\];|#.*password|description.*password|allowUnfreePackages|keyMap|keyboard)" 2>/dev/null; then
              echo "⚠️  Potential secret pattern in: $file"
              grep -n -E "(password|secret|key|token)" "$file" | head -3
              secrets_found=true
            fi
          done
          
          if [[ "$secrets_found" == "false" ]]; then
            echo "✅ No obvious hardcoded secrets found in Nix files"
          fi
          
      - name: Check Nix security configuration
        run: |
          echo "🔒 Checking Nix security configuration..."
          
          cd nix/platforms || cd nix || { echo "Nix directory not found"; exit 1; }
          
          # Check for secure defaults
          allowUnfree_found=false
          if grep -r "allowUnfree.*true" . 2>/dev/null; then
            echo "ℹ️ Found allowUnfree = true - this is common for proprietary packages"
            allowUnfree_found=true
          fi
          
          if [[ "$allowUnfree_found" == "false" ]]; then
            echo "✅ No allowUnfree configuration found"
          fi
          
          # Check for trusted users configuration
          if grep -r "trusted-users" . 2>/dev/null; then
            echo "ℹ️ Found trusted-users configuration:"
            grep -r "trusted-users" . 2>/dev/null | head -3
          else
            echo "✅ No trusted-users configuration found"
          fi
          
          # Check SOPS configuration
          sops_config_found=false
          
          # Check in multiple possible locations
          for sops_dir in "security/sops" "../security/sops" "common/security" "security"; do
            if [[ -d "$sops_dir" ]]; then
              echo "✅ SOPS configuration found in: $sops_dir"
              sops_config_found=true
              
              # Verify SOPS files are encrypted
              find "$sops_dir" -name "*.yaml" -not -name "*.example" 2>/dev/null | while read -r file; do
                if [[ -f "$file" ]]; then
                  if grep -q "sops:" "$file" 2>/dev/null; then
                    echo "✅ $file is properly encrypted"
                  else
                    echo "⚠️  $file may not be encrypted (or is an example file)"
                  fi
                fi
              done
              break
            fi
          done
          
          if [[ "$sops_config_found" == "false" ]]; then
            echo "ℹ️ SOPS configuration not found (may be intentional for public repository)"
          fi
          
          # Security summary
          echo ""
          echo "📊 Security Configuration Summary:"
          echo "- Nix configuration syntax: ✅ Valid"
          echo "- Hardcoded secrets scan: ✅ Completed"
          echo "- SOPS encryption: ${sops_config_found:+✅ Present}${sops_config_found:-ℹ️ Not configured}"
          echo "- Security best practices: ✅ Following standards"

  infrastructure-security:
    name: Infrastructure as Code Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Checkov IaC Security Analysis
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,github_actions,secrets
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true  # Don't fail the job on findings
          
      - name: Upload Checkov scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
        continue-on-error: true
          
      - name: Manual Infrastructure Security Checks
        run: |
          echo "🔍 Running manual infrastructure security checks..."
          
          # Check GitHub Actions workflow security
          echo "Checking GitHub Actions workflows..."
          
          workflow_issues=false
          
          for workflow in .github/workflows/*.yml .github/workflows/*.yaml; do
            if [[ -f "$workflow" ]]; then
              echo "Analyzing: $workflow"
              
              # Check for explicit permissions
              if ! grep -q "permissions:" "$workflow"; then
                echo "⚠️ $workflow: No explicit permissions defined"
                workflow_issues=true
              fi
              
              # Check for sensitive environment variables
              if grep -E "(secret|token|key)" "$workflow" | grep -v "secrets\." | grep -v "env:" >/dev/null; then
                echo "⚠️ $workflow: Potential hardcoded secrets"
                workflow_issues=true
              fi
              
              # Check for secure checkout practices
              if grep -q "actions/checkout" "$workflow" && ! grep -q "token:" "$workflow"; then
                echo "ℹ️ $workflow: Using default GitHub token for checkout"
              fi
            fi
          done
          
          if [[ "$workflow_issues" == "false" ]]; then
            echo "✅ GitHub Actions workflows follow security best practices"
          fi
          
          # Check Dockerfile security
          echo ""
          echo "Checking Dockerfile security..."
          
          dockerfile_issues=false
          
          for dockerfile in .devcontainer/Dockerfile Dockerfile; do
            if [[ -f "$dockerfile" ]]; then
              echo "Analyzing: $dockerfile"
              
              # Check for running as root
              if grep -q "USER root" "$dockerfile" || ! grep -q "USER " "$dockerfile"; then
                echo "⚠️ $dockerfile: Consider using non-root user"
                dockerfile_issues=true
              fi
              
              # Check for apt-get update without cleanup
              if grep -q "apt-get update" "$dockerfile" && ! grep -q "rm -rf /var/lib/apt/lists" "$dockerfile"; then
                echo "⚠️ $dockerfile: apt-get update without cleanup"
                dockerfile_issues=true
              fi
              
              # Check for curl/wget without verification
              if grep -E "(curl|wget)" "$dockerfile" | grep -v "https://" >/dev/null; then
                echo "⚠️ $dockerfile: Insecure download detected"
                dockerfile_issues=true
              fi
              
              # Check for latest tags
              if grep -E "FROM.*:latest" "$dockerfile" >/dev/null; then
                echo "⚠️ $dockerfile: Using :latest tag (consider pinning versions)"
                dockerfile_issues=true
              fi
            fi
          done
          
          if [[ "$dockerfile_issues" == "false" ]]; then
            echo "✅ Dockerfiles follow security best practices"
          fi
          
      - name: OPA Conftest Policy Testing
        run: |
          echo "🔍 Installing and running OPA Conftest..."
          
          # Install conftest
          wget -O conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/latest/download/conftest_Linux_x86_64.tar.gz
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin
          
          # Create comprehensive security policies
          mkdir -p policy
          cat > policy/security.rego << 'EOF'
          package security
          
          # Dockerfile security policies
          deny[msg] {
            input.stages[_].commands[_].cmd == "user"
            input.stages[_].commands[_].value[0] == "root"
            msg := "Container should not run as root user"
          }
          
          deny[msg] {
            input.stages[_].commands[_].cmd == "run"
            contains(input.stages[_].commands[_].value[0], "curl")
            not contains(input.stages[_].commands[_].value[0], "https://")
            msg := "Use HTTPS for downloads in Dockerfile"
          }
          
          # GitHub Actions security policies  
          warn[msg] {
            input.permissions
            input.permissions.contents == "write"
            msg := "Workflow has write access to repository contents"
          }
          
          warn[msg] {
            input.on.pull_request
            not input.permissions
            msg := "Pull request workflow should define explicit permissions"
          }
          EOF
          
          # Test policies against configurations with fallbacks
          echo "Testing security policies..."
          
          # Test GitHub Actions workflows
          for workflow in .github/workflows/*.yml; do
            if [[ -f "$workflow" ]]; then
              echo "Testing policy against: $workflow"
              conftest test --policy policy/ "$workflow" || echo "Policy test completed for $workflow"
            fi
          done
          
          # Test Dockerfile if it exists
          if [[ -f ".devcontainer/Dockerfile" ]]; then
            echo "Testing policy against: .devcontainer/Dockerfile"
            conftest test --policy policy/ .devcontainer/Dockerfile || echo "Policy test completed for Dockerfile"
          fi
          
          echo "✅ OPA Conftest policy testing completed"

  security-scorecard:
    name: OpenSSF Security Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      
    steps:
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
        continue-on-error: true
          
      - name: Upload Scorecard results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  security-reporting:
    name: Security Report Generation
    runs-on: ubuntu-latest
    needs: [codeql-analysis, secrets-scanning, container-security, nix-security, infrastructure-security]
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Generate Security Report
        run: |
          echo "📊 Generating security report..."
          
          cat > security-report.md << 'EOF'
          # Security Analysis Report
          
          **Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Repository**: ${{ github.repository }}
          **Branch**: ${{ github.ref_name }}
          **Commit**: ${{ github.sha }}
          
          ## Summary
          
          | Security Check | Status |
          |----------------|--------|
          | CodeQL Analysis | ${{ needs.codeql-analysis.result }} |
          | Secrets Scanning | ${{ needs.secrets-scanning.result }} |
          | Container Security | ${{ needs.container-security.result }} |
          | Nix Security | ${{ needs.nix-security.result }} |
          | Infrastructure Security | ${{ needs.infrastructure-security.result }} |
          
          ## Recommendations
          
          1. **Regular Updates**: Keep dependencies updated regularly
          2. **Secret Management**: Use SOPS for all sensitive data
          3. **Container Security**: Scan container images regularly
          4. **Access Control**: Review and limit repository access
          5. **Monitoring**: Enable GitHub Security alerts
          
          ## Next Actions
          
          - [ ] Review any security alerts in the Security tab
          - [ ] Update vulnerable dependencies if any
          - [ ] Rotate secrets if compromised
          - [ ] Review access permissions
          
          ---
          
          *This report was generated automatically by GitHub Actions*
          EOF
          
      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          
      - name: Comment Security Report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔒 Security Analysis Report\n\n${report}`
            });