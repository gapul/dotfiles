name: Dotfiles CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint and Syntax Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq shellcheck
        python3 -m pip install --break-system-packages PyYAML
        
    - name: Check shell scripts syntax
      run: |
        echo "Checking shell scripts..."
        for script in *.sh archive/legacy-scripts/*.sh; do
          if [[ -f "$script" ]]; then
            echo "Checking $script"
            bash -n "$script"
          fi
        done
        
    - name: Run shellcheck on shell scripts
      run: |
        echo "Running shellcheck..."
        for script in *.sh scripts/*.sh; do
          if [[ -f "$script" ]]; then
            echo "Checking $script with shellcheck"
            # Exclude common style warnings that don't affect functionality
            shellcheck -e SC1091,SC2129,SC2155,SC2034,SC2295,SC2016,SC2009 "$script"
          fi
        done
        
    - name: Validate JSON configuration files
      run: |
        echo "Validating JSON files..."
        find configs -name "*.json" -type f | while read -r file; do
          echo "Validating $file"
          jq empty "$file" || { echo "Invalid JSON: $file"; exit 1; }
        done
        
    - name: Install TOML parser
      run: |
        python3 -m pip install --break-system-packages tomli
        
    - name: Validate TOML configuration files
      run: |
        echo "Validating TOML files..."
        python3 .github/scripts/validate_toml.py
        
    - name: Check dependencies
      run: |
        echo "Checking file dependencies and references..."
        chmod +x scripts/check-dependencies.sh
        scripts/check-dependencies.sh --verbose || true
        echo "Dependency check completed (warnings are acceptable)"

  test-install:
    name: Test Installation Script
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Test Nix-integrated install script
      run: |
        echo "Testing Nix-integrated install script..."
        
        # ヘルプオプションのテスト
        echo "=== Testing --help option ==="
        ./install.sh --help
        
        # バックアップ機能のテスト
        echo "=== Testing backup functionality ==="
        ./install.sh --list-backups
        
        # 設定ファイルの存在確認（home.nixベース）
        echo "=== Verifying home.nix configuration ==="
        if [[ -f "nix/home.nix" ]]; then
          echo "✅ home.nix found"
          # home.file セクションの存在確認
          if grep -q "home.file" nix/home.nix; then
            echo "✅ home.file configuration found"
          else
            echo "❌ home.file configuration not found"
            exit 1
          fi
        else
          echo "❌ nix/home.nix not found"
          exit 1
        fi
        
        # テーマ設定ファイルの確認
        echo "=== Verifying theme configuration ==="
        if [[ -f "nix/common/theme.nix" ]]; then
          echo "✅ theme.nix found"
        else
          echo "❌ theme.nix not found"
          exit 1
        fi
        
        # 統合システムアナライザーのテスト
        echo "=== Testing system analyzer ==="
        if [[ -f "scripts/system-analyzer.sh" ]]; then
          echo "✅ system-analyzer.sh found"
          chmod +x scripts/system-analyzer.sh
          scripts/system-analyzer.sh --help
        else
          echo "❌ system-analyzer.sh not found"
          exit 1
        fi
        
        # レガシー関数が削除されていることを確認
        echo "=== Verifying legacy functions removed ==="
        if grep -q "^create_symlinks\|^[[:space:]]*create_symlinks" scripts/install.sh; then
          echo "❌ Legacy symlink functions still present"
          exit 1
        else
          echo "✅ Legacy functions properly removed"
        fi
        
        echo "Script syntax validation..."
        bash -n install.sh
        bash -n scripts/install.sh
        
    - name: Test Nix wrapper functionality
      run: |
        echo "Testing Nix wrapper functionality..."
        
        # Migration noticeの確認
        echo "=== Testing migration notice ==="
        output=$(./install.sh 2>&1 | head -20 || true)
        if echo "$output" | grep -q "MIGRATION NOTICE"; then
          echo "✅ Migration notice displayed correctly"
        else
          echo "❌ Migration notice not found"
          exit 1
        fi
        
        if echo "$output" | grep -q "home-manager"; then
          echo "✅ home-manager references found"
        else
          echo "❌ home-manager references not found"
          exit 1
        fi
        
        echo "Nix wrapper test completed successfully"

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        brew install shellcheck jq
        
    - name: Test install script on macOS
      run: |
        echo "Testing on macOS..."
        ./install.sh --help
        bash -n install.sh
        echo "macOS test completed"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Scan for secrets
      run: |
        echo "Scanning for potential secrets..."
        # 基本的なシークレットパターンをチェック
        if grep -r -E "(password|secret|key|token).*=" configs/ --include="*.json" --include="*.toml" --include="*.yml" --include="*.yaml"; then
          echo "⚠️  Potential secrets found in configuration files"
          exit 1
        else
          echo "✅ No obvious secrets found"
        fi
        
    - name: Check file permissions
      run: |
        echo "Checking for overly permissive files..."
        find . -type f -perm /077 -name "*.sh" -o -name "*.json" -o -name "*.toml" | while read -r file; do
          echo "Warning: $file has permissive permissions"
        done