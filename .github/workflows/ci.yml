name: Dotfiles CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint and Syntax Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq shellcheck
        
    - name: Check shell scripts syntax
      run: |
        echo "Checking shell scripts..."
        for script in *.sh scripts/*.sh; do
          if [[ -f "$script" ]]; then
            echo "Checking $script"
            bash -n "$script"
          fi
        done
        
    - name: Run shellcheck on shell scripts
      run: |
        echo "Running shellcheck..."
        for script in *.sh scripts/*.sh; do
          if [[ -f "$script" ]]; then
            echo "Checking $script with shellcheck"
            shellcheck -e SC1091 "$script"
          fi
        done
        
    - name: Validate JSON configuration files
      run: |
        echo "Validating JSON files..."
        find configs -name "*.json" -type f | while read -r file; do
          echo "Validating $file"
          jq empty "$file" || { echo "Invalid JSON: $file"; exit 1; }
        done
        
    - name: Install TOML parser
      run: |
        python3 -m pip install --break-system-packages tomli
        
    - name: Validate TOML configuration files
      run: |
        echo "Validating TOML files..."
        python3 .github/scripts/validate_toml.py

  test-install:
    name: Test Installation Script
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Create test environment
      run: |
        mkdir -p test_home/.config
        mkdir -p test_home/.docker
        mkdir -p test_home/Library/Application\ Support/Code/User
        
    - name: Test install script comprehensive
      env:
        HOME: ${{ github.workspace }}/test_home
      run: |
        echo "Testing install script comprehensively..."
        # ヘルプオプションのテスト
        ./install.sh --help
        
        echo "Verifying all managed config files exist..."
        # 管理対象ファイルの存在確認
        missing_files=0
        while IFS=':' read -r source_path target_path; do
          if [[ -n "$source_path" && "$source_path" != *"#"* ]]; then
            source_file="configs/${source_path#configs/}"
            if [[ ! -f "$source_file" && ! -d "$source_file" ]]; then
              echo "❌ Missing: $source_file"
              missing_files=$((missing_files + 1))
            else
              echo "✅ Found: $source_file"
            fi
          fi
        done < <(grep -E '^\s*"[^"]*:[^"]*"' scripts/install.sh | sed 's/[",]//g' | sed 's/^\s*//')
        
        if [[ $missing_files -gt 0 ]]; then
          echo "❌ $missing_files managed files are missing!"
          exit 1
        fi
        
        echo "Testing script syntax..."
        bash -n install.sh
        bash -n scripts/install.sh
        
        echo "Testing backup functionality..."
        # テスト用のダミーファイルを作成
        mkdir -p test_home
        echo "# Test file" > test_home/.zshrc
        echo "# Test profile" > test_home/.zprofile
        echo "# Test starship config" > test_home/.config/starship.toml
        
        # 実際にinstall.shを実行してバックアップをテスト
        echo "Running install.sh to test backup creation..."
        ./install.sh || true
        
        # バックアップディレクトリが作成されたかチェック
        if [[ -d "backups" ]] && [[ $(ls -1 backups/ | wc -l) -gt 0 ]]; then
          echo "✅ Backup functionality working correctly"
          ls -la backups/
        else
          echo "⚠️  No backups created (may be expected if no conflicts)"
        fi
        
        echo "Verifying symlink creation..."
        # 作成されたシンボリックリンクの確認
        symlinks_created=0
        if [[ -L "test_home/.zshrc" ]]; then
          echo "✅ .zshrc symlink created"
          symlinks_created=$((symlinks_created + 1))
        fi
        if [[ -L "test_home/.zprofile" ]]; then
          echo "✅ .zprofile symlink created"
          symlinks_created=$((symlinks_created + 1))
        fi
        if [[ -L "test_home/.config/starship.toml" ]]; then
          echo "✅ starship.toml symlink created"
          symlinks_created=$((symlinks_created + 1))
        fi
        
        echo "Created $symlinks_created symlinks successfully"
        
    - name: Test idempotency
      env:
        HOME: ${{ github.workspace }}/test_home  
      run: |
        echo "Testing idempotency..."
        # 同一スクリプトを2回実行して冪等性を確認
        if [[ -f configs/zsh/zshrc ]]; then
          echo "Running install script twice to test idempotency..."
          
          # 1回目の実行
          echo "=== First run ==="
          ./install.sh
          first_run_output=$(./install.sh 2>&1)
          
          # 2回目の実行 - 既存のリンクがある状態
          echo "=== Second run ==="
          second_run_output=$(./install.sh 2>&1)
          
          # 2回目の実行で "既に正しく設定されています" メッセージが含まれることを確認
          if echo "$second_run_output" | grep -q "既に正しく設定されています"; then
            echo "✅ Idempotency test passed - script correctly detected existing symlinks"
          else
            echo "⚠️  Idempotency test warning - script may be recreating existing symlinks"
            echo "Second run output: $second_run_output"
          fi
          
          # --force オプションのテスト
          echo "=== Testing --force option ==="
          force_output=$(./install.sh --force 2>&1)
          if echo "$force_output" | grep -q "強制モード"; then
            echo "✅ Force mode test passed"
          else
            echo "❌ Force mode test failed"
            exit 1
          fi
          
          echo "Idempotency test completed successfully"
        else
          echo "⚠️  Skipping idempotency test - .zshrc config not found"
        fi

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        brew install shellcheck jq
        
    - name: Test install script on macOS
      run: |
        echo "Testing on macOS..."
        ./install.sh --help
        bash -n install.sh
        echo "macOS test completed"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Scan for secrets
      run: |
        echo "Scanning for potential secrets..."
        # 基本的なシークレットパターンをチェック
        if grep -r -E "(password|secret|key|token).*=" configs/ --include="*.json" --include="*.toml" --include="*.yml" --include="*.yaml"; then
          echo "⚠️  Potential secrets found in configuration files"
          exit 1
        else
          echo "✅ No obvious secrets found"
        fi
        
    - name: Check file permissions
      run: |
        echo "Checking for overly permissive files..."
        find . -type f -perm /077 -name "*.sh" -o -name "*.json" -o -name "*.toml" | while read -r file; do
          echo "Warning: $file has permissive permissions"
        done