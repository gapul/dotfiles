name: GitHub Project Management Automation

on:
  issues:
    types: [opened, closed, reopened, labeled, assigned]
  pull_request:
    types: [opened, closed, merged, labeled, assigned, ready_for_review, converted_to_draft]
  project_card:
    types: [moved]

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  add-to-project:
    name: Add Items to Project Board
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    
    steps:
      - name: Add issue to project
        if: github.event_name == 'issues'
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/gapul/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}
          labeled: bug,enhancement,documentation
          
      - name: Add PR to project
        if: github.event_name == 'pull_request'
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/gapul/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}

  auto-assign-issues:
    name: Auto-assign Issues Based on Labels
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'labeled'
    
    steps:
      - name: Auto-assign based on label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const label = context.payload.label;
            
            // Auto-assignment rules based on labels
            const assignmentRules = {
              'nix': ['gapul'],
              'macos': ['gapul'],
              'security': ['gapul'],
              'documentation': ['gapul'],
              'github-actions': ['gapul'],
              'bug': ['gapul'],
              'enhancement': ['gapul']
            };
            
            if (assignmentRules[label.name] && issue.assignees.length === 0) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: assignmentRules[label.name]
              });
              
              console.log(`Auto-assigned ${assignmentRules[label.name].join(', ')} to issue #${issue.number} based on label: ${label.name}`);
            }

  update-project-status:
    name: Update Project Board Status
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' || github.event.action == 'merged'
    
    steps:
      - name: Move completed items
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            // This would update project board status
            // Implementation depends on GitHub Projects v2 API
            console.log('Project status update triggered');
            
            if (context.eventName === 'issues' && context.payload.issue.state === 'closed') {
              console.log(`Issue #${context.payload.issue.number} was closed`);
            }
            
            if (context.eventName === 'pull_request' && context.payload.pull_request.merged) {
              console.log(`PR #${context.payload.pull_request.number} was merged`);
            }

  create-release-checklist:
    name: Create Release Checklist
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && contains(github.event.issue.title, '[RELEASE]')
    
    steps:
      - name: Add release checklist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.issue.number;
            
            const checklistBody = `
            ## 🚀 Release Checklist
            
            ### Pre-release Tasks
            - [ ] Update version numbers
            - [ ] Update CHANGELOG.md
            - [ ] Run full test suite
            - [ ] Security scan passes
            - [ ] Documentation is up to date
            - [ ] All critical issues resolved
            
            ### Release Process
            - [ ] Create release branch
            - [ ] Tag release version
            - [ ] Build and test packages
            - [ ] Update container images
            - [ ] Deploy to GitHub Packages
            - [ ] Create GitHub release
            
            ### Post-release Tasks
            - [ ] Announce release
            - [ ] Update documentation
            - [ ] Monitor for issues
            - [ ] Plan next release cycle
            
            ### Testing Matrix
            - [ ] macOS (Apple Silicon)
            - [ ] macOS (Intel)
            - [ ] Linux (Ubuntu)
            - [ ] WSL
            - [ ] GitHub Codespaces
            - [ ] Android (Termux)
            
            ---
            
            *This checklist was automatically generated*
            `;
            
            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: checklistBody
            });

  triage-new-issues:
    name: Auto-triage New Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    
    steps:
      - name: Auto-triage issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            
            let labels = ['needs-triage'];
            
            // Auto-label based on content
            if (title.includes('[bug]') || body.includes('bug') || body.includes('error')) {
              labels.push('bug');
            }
            
            if (title.includes('[feature]') || body.includes('feature') || body.includes('enhancement')) {
              labels.push('enhancement');
            }
            
            if (body.includes('macos') || body.includes('darwin')) {
              labels.push('macos');
            }
            
            if (body.includes('linux') || body.includes('ubuntu')) {
              labels.push('linux');
            }
            
            if (body.includes('nix') || body.includes('home-manager')) {
              labels.push('nix');
            }
            
            if (body.includes('security') || body.includes('sops')) {
              labels.push('security');
            }
            
            if (body.includes('documentation') || body.includes('docs')) {
              labels.push('documentation');
            }
            
            if (body.includes('codespaces') || body.includes('devcontainer')) {
              labels.push('codespaces');
            }
            
            // Add priority labels
            if (title.includes('critical') || title.includes('urgent')) {
              labels.push('priority:high');
            } else if (title.includes('minor') || title.includes('nice to have')) {
              labels.push('priority:low');
            } else {
              labels.push('priority:medium');
            }
            
            // Apply labels
            if (labels.length > 1) { // More than just 'needs-triage'
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
            }
            
            // Add welcome comment for first-time contributors
            const { data: issueCount } = await github.rest.search.issuesAndPullRequests({
              q: `author:${issue.user.login} repo:${context.repo.owner}/${context.repo.repo}`
            });
            
            if (issueCount.total_count === 1) {
              const welcomeComment = `
              👋 Welcome to the dotfiles repository! Thank you for your first contribution.
              
              Your issue has been automatically triaged and labeled. A maintainer will review it soon.
              
              **What happens next?**
              - A maintainer will review and provide feedback
              - You may be asked for additional information
              - If approved, the issue will be added to our project board
              
              **Helpful resources:**
              - 📚 [Documentation](https://github.com/gapul/dotfiles/wiki)
              - 💬 [Discussions](https://github.com/gapul/dotfiles/discussions)
              - 🔧 [Contributing Guide](https://github.com/gapul/dotfiles/blob/main/CONTRIBUTING.md)
              `;
              
              await github.rest.issues.createComment({
                issue_number: issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: welcomeComment
              });
            }

  milestone-automation:
    name: Milestone Management
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event_name == 'issues'
    
    steps:
      - name: Update milestone progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            
            if (issue.milestone) {
              const { data: milestone } = await github.rest.issues.getMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone_number: issue.milestone.number
              });
              
              console.log(`Issue #${issue.number} completed in milestone: ${milestone.title}`);
              console.log(`Milestone progress: ${milestone.closed_issues}/${milestone.closed_issues + milestone.open_issues} issues completed`);
              
              // Check if milestone is complete
              if (milestone.open_issues === 0) {
                const completionComment = `
                🎉 **Milestone "${milestone.title}" completed!**
                
                All issues in this milestone have been resolved. Consider:
                - Creating a release
                - Updating documentation
                - Planning the next milestone
                `;
                
                // Post completion comment on the last closed issue
                await github.rest.issues.createComment({
                  issue_number: issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: completionComment
                });
              }
            }