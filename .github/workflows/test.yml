name: Test CI Configuration

on:
  workflow_dispatch:

jobs:
  test-syntax:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Test YAML syntax
      run: |
        python3 -c "
        import yaml
        with open('.github/workflows/ci.yml', 'r') as f:
            yaml.safe_load(f)
        print('✅ CI YAML syntax is valid')
        "