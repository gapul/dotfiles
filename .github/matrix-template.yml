# 並列実行Matrix戦略テンプレート

strategy:
  fail-fast: false
  matrix:
    # プラットフォーム並列実行
    platform:
      - os: ubuntu-latest
        name: Linux
        cache_key: linux
      - os: macos-latest  
        name: macOS
        cache_key: macos
      - os: windows-latest
        name: Windows
        cache_key: windows
    
    # 言語バージョン並列実行
    version:
      - name: stable
        version: stable
      - name: beta
        version: beta
        allow_failure: true
    
    # テストタイプ並列実行
    test_type:
      - name: unit
        command: "test:unit"
        timeout: 15
      - name: integration
        command: "test:integration"
        timeout: 30
      - name: e2e
        command: "test:e2e"
        timeout: 60

# 条件付き実行
include:
  - platform: { os: ubuntu-latest }
    test_type: { name: security }
    version: { name: stable }
  
exclude:
  - platform: { os: windows-latest }
    test_type: { name: e2e }

# 継続実行設定
continue-on-error: ${{ matrix.version.allow_failure || false }}
timeout-minutes: ${{ matrix.test_type.timeout || 30 }}
