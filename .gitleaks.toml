# gitleaks config: dotfiles 用カスタマイズ
# 除外:
#   - SOPS 暗号化済 secrets/*.yaml (中身は暗号化なので無害)
#   - uosc プラグインソース (third-party Lua、open_subtitles の placeholder)
#   - *.example / templates / docs (placeholder のみ)

[extend]
useDefault = true

[allowlist]
description = "SOPS encrypted files, third-party plugins, template placeholders"
paths = [
  '''secrets/.*\.yaml$''',
  '''\.sops\.yaml$''',
  '''configs/media/mpv/scripts/uosc/.*''',
  '''.*\.example$''',
  '''templates/.*''',
  '''docs/.*''',
]
# NOTE: ここに PRIVATE KEY の regex を入れると「秘密鍵らしき文字列を検出しても
# 無視する」= gitleaks の最重要保護を無効化してしまうため絶対に追加しない。
# placeholder の除外は上の paths 側 (templates/ docs/ *.example) で行う。
