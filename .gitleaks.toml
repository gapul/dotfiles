# GitLeaks Configuration for Dotfiles Security
# Detects potential secrets and credentials in the repository

title = "Dotfiles Security - GitLeaks Configuration"

# Extend default rules
[extend]
# Use default GitLeaks rules as base
useDefault = true

# Custom rules for dotfiles-specific patterns
[[rules]]
id = "ssh-private-key"
description = "SSH Private Key"
regex = '''-----BEGIN (RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----'''
secretGroup = 1
severity = "high"
keywords = ["BEGIN", "PRIVATE", "KEY"]

[[rules]]
id = "age-private-key"
description = "Age Private Key"
regex = '''AGE-SECRET-KEY-[A-Z0-9]{58}'''
severity = "high"
keywords = ["AGE-SECRET-KEY"]

[[rules]]
id = "sops-key"
description = "SOPS Age Key"
regex = '''age1[a-z0-9]{58}'''
severity = "medium"
keywords = ["age1"]

[[rules]]
id = "github-token"
description = "GitHub Token"
regex = '''gh[pousr]_[A-Za-z0-9_]{36,255}'''
severity = "high"
keywords = ["ghp_", "gho_", "ghu_", "ghs_", "ghr_"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API Key"
regex = '''sk-[A-Za-z0-9]{48}'''
severity = "high"
keywords = ["sk-"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-api03-[A-Za-z0-9_-]{95}'''
severity = "high"
keywords = ["sk-ant-api03"]

[[rules]]
id = "npm-token"
description = "NPM Token"
regex = '''npm_[A-Za-z0-9]{36}'''
severity = "medium"
keywords = ["npm_"]

[[rules]]
id = "homebrew-token"
description = "Homebrew GitHub Token"
regex = '''HOMEBREW_GITHUB_API_TOKEN=[A-Za-z0-9_]{40}'''
severity = "medium"
keywords = ["HOMEBREW_GITHUB_API_TOKEN"]

# Path-based allowlist
[allowlist]
description = "Allowlist for safe patterns and example files"
paths = [
    '''\.git/''',
    '''\.gitleaks\.toml''',
    '''\.example$''',
    '''\.template$''',
    '''\.tmpl$''',
    '''\.sample$''',
    '''README\.md''',
    '''SECURITY\.md''',
    '''\.github/workflows/''',
    '''docs/''',
    '''nix/platforms/security/sops/.*\.example''',
]

# Regex-based allowlist for false positives
regexes = [
    # Example/template patterns
    '''example_encrypted_[a-z_]+''',
    '''ENC\[AES256_GCM,data:example_[a-z_]+''',
    '''age1[a-z0-9]{58}  # Example age key in documentation''',
    '''sk-[A-Za-z0-9]{48}  # Example OpenAI key''',
    '''# This is just an example''',
    '''placeholder''',
    '''dummy''',
    '''test_key''',
    '''example_key''',
    '''sample_key''',
    
    # Development/CI patterns that are safe
    '''secrets\.GITHUB_TOKEN''',
    '''secrets\.CACHIX_AUTH_TOKEN''',
    '''secrets\.SOPS_AGE_KEY_TEST''',
    
    # Configuration comments
    '''# Age private key location''',
    '''# Personal development key''',
    '''# CI/CD key \(to be generated\)''',
]

# Files to ignore completely
files = [
    "nix/platforms/security/sops/secrets.yaml.example",
    "nix/platforms/security/sops/secrets-darwin.yaml.example",
    "docs/PHASE4_TASK_4_3_SPECIFICATION.md",
]

# Additional entropy check for high-confidence detection
[allowlist.entropy]
# Minimum entropy for secret detection
min = 3.5
# Maximum entropy (to avoid false positives on random strings)
max = 8.0

# Commit scanning configuration
[allowlist.commits]
# Allow specific commits (example: initial setup commits)
stoplist = []

# Configure output
[output]
# Don't exit with error code on finding secrets in allowlisted files
nonBlocking = true