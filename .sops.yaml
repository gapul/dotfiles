# Fork する人は: 自分の age 鍵を生成して下の public key を差し替え
#   age-keygen -o ~/.config/sops/age/keys.txt
#   出力された "# public key: age1..." の行を下の age1... に貼り換える
keys:
  - &me age1crkk4dtd824qu3h5q24vnm4pmrjymzkelt60qnyzwcje74gncudqjr693n

creation_rules:
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *me
